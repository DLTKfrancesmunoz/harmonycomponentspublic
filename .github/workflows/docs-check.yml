name: Docs Check

on:
  pull_request:
    paths:
      - 'src/components/ui/**'
      - 'src/pages/components/**'
      - 'scripts/generate-component-props-inventory.js'
      - 'scripts/compare-docs-with-components.js'

jobs:
  docs-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate props inventory and compare with docs
        run: npm run docs:check
