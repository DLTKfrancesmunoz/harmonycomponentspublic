name: Publish NPM Package

# This workflow publishes the NPM package to GitHub Packages
# For documentation site deployment, see deploy-release.yml

on:
  push:
    branches:
      - main
    paths:
      - 'package.json'
      - 'src/**'
      - '.github/workflows/publish.yml'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    env:
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@deltek-sst'

      - name: Install dependencies
        run: npm ci

      - name: Generate timestamped version
        id: version
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version")
          TIMESTAMP=$(date +%s)
          VERSION="${BASE_VERSION}-${TIMESTAMP}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "base_version=$BASE_VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "Generated version: $VERSION"

      - name: Update package.json with timestamped version
        run: |
          npm version ${{ steps.version.outputs.version }} --no-git-tag-version
          cat package.json | grep version

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          HUSKY: '0'

      - name: Create Git tag
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          release_name: Release ${{ steps.version.outputs.tag }}
          body: |
            ## NPM Package Published

            **Version:** `${{ steps.version.outputs.version }}`
            **Base Version:** `${{ steps.version.outputs.base_version }}`

            ### Installation
            ```bash
            npm install @deltek-sst/harmony-design-system@${{ steps.version.outputs.version }}
            ```

            Or use latest:
            ```bash
            npm install @deltek-sst/harmony-design-system@latest
            ```

            ### What's New
            Auto-published from commit: ${{ github.sha }}
          draft: false
          prerelease: false
