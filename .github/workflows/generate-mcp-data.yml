name: Generate MCP Data

on:
  push:
    branches: [main]
    paths:
      - 'src/components/ui/**'
      - 'src/styles/**'
      - 'src/tokens/**'
      - 'src/layouts/**'
      - 'scripts/generate-mcp-data.js'
      - 'scripts/extract-design-tokens.js'
      - 'scripts/generate-layout-data.js'
      - 'scripts/generate-manifest.js'
      - 'scripts/css-parser.js'
      - 'scripts/visual-spec-extractor.js'

jobs:
  generate-mcp-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Clear MCP data cache
        run: rm -rf .cache/components-regeneration-cache.json

      - name: Generate MCP data with visual specifications
        run: npm run generate:mcp-data

      - name: Verify generation produced valid output
        run: node scripts/verify-mcp-generation.cjs

      - name: Commit MCP data updates
        run: |
          git config user.name "MCP Data Bot"
          git config user.email "mcp-data-bot@github-actions"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          
          # Fetch latest changes before committing
          git fetch origin main
          
          git add mcp-data/
          if git diff --staged --quiet; then
            echo "No MCP data changes to commit"
          else
            git commit -m "chore: regenerate MCP data with visual specifications [skip ci]"
            
            # Attempt to push, with retry logic for race conditions
            if ! git push origin main; then
              echo "Push failed, fetching latest changes and rebasing..."
              git fetch origin main
              git rebase origin/main || {
                echo "Rebase failed, attempting merge strategy..."
                git rebase --abort 2>/dev/null || true
                git merge origin/main -m "Merge remote changes" || {
                  echo "Merge also failed. Checking if changes are already committed..."
                  git status
                  exit 1
                }
              }
              # Retry push after rebase/merge
              if ! git push origin main; then
                echo "Failed to push changes after rebase/merge"
                git status
                exit 1
              fi
            fi
            echo "Successfully pushed MCP data updates"
          fi
