name: Deploy Release

on:
  push:
    branches:
      - main

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      branch: ${{ github.head_ref }}
      commit: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v5
      - name: create version build-info
        id: version
        run: |
          VERSION=$(cat version.txt | xargs).$(date +%s)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  release:
    runs-on: ubuntu-latest
    needs:
      - version
    env:
      VERSION: ${{needs.version.outputs.version}}
    steps:
      - uses: actions/checkout@v5

      - name: Check GH_TOKEN
        id: check-token
        run: |
          if [ -z "${{ secrets.GH_TOKEN }}" ]; then
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "⚠️ GH_TOKEN not configured - Deltek Cloud deployment will be skipped"
          else
            echo "configured=true" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Deltek Cloud
        if: steps.check-token.outputs.configured == 'true'
        uses: deltek-sst/deltek-cloud-release-action@v2
        with:
          version: ${{ needs.version.outputs.version }}
          release-appid: ${{ secrets.DELTEK_CLOUD_RELEASES_APPID }}
          release-pem: ${{ secrets.DELTEK_CLOUD_RELEASES_PEM }}
        continue-on-error: true

      - name: Deployment skipped
        if: steps.check-token.outputs.configured == 'false'
        run: |
          echo "⚠️ Deltek Cloud deployment skipped - GH_TOKEN not configured"
          echo "To enable deployment:"
          echo "1. Create a PAT at https://github.com/settings/tokens"
          echo "2. Add it as GH_TOKEN secret in repository settings"
          echo "3. Ensure it has access to deltek-cloud-releases repository"
