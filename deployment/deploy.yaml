apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: deploy-harmony-design-system
spec:
  entrypoint: main
  arguments:
    parameters:
      - name: version
      - name: targets
        value: '[]'
  templates:
    - name: main
      inputs:
        parameters:
        - name: version
        - name: targets
      dag:
        tasks:
          - name: acceptance
            template: deploy-target
            arguments:
              parameters:
              - name: version
                value: "{{inputs.parameters.version}}"
              - name: target
                value: deltekcloud-integration-int-1
          - name: performance
            dependencies: [acceptance]
            template: deploy-target
            arguments:
              parameters:
              - name: version
                value: "{{inputs.parameters.version}}"
              - name: target
                value: deltekcloud-performance-perf-1
          - name: preproduction
            dependencies: [acceptance]
            template: deploy-target
            arguments:
              parameters:
              - name: version
                value: "{{inputs.parameters.version}}"
              - name: target
                value: deltekcloud-preproduction-pre-1
          - name: approve
            dependencies: [acceptance, preproduction]
            template: approve
          - name: production
            dependencies: [acceptance, preproduction, approve]
            template: deploy-target
            arguments:
              parameters:
              - name: version
                value: "{{inputs.parameters.version}}"
              - name: target
                value: "{{item}}"
            withParam: "{{inputs.parameters.targets}}"

    - name: approve
      suspend: {}

    - name: deploy-target
      serviceAccountName: "deployer.{{inputs.parameters.target}}"
      volumes:
      - name: bucket-credentials
        secret:
          secretName: "{{inputs.parameters.target}}-sst-harmony-origin-shared-bucket"
      inputs:
        parameters:
        - name: target
        - name: version
        artifacts:
        - name: source
          path: /src
          git:
            repo: git@github.com:deltek-sst/ux-harmony-design-system.git
            sshPrivateKeySecret:
              name: github-ssh-access
              key: ssh-privatekey
            revision: "{{inputs.parameters.version}}"
      container:
        image: node:20-alpine
        env:
          - name: TARGET
            value: "{{inputs.parameters.target}}"
          - name: VERSION
            value: "{{inputs.parameters.version}}"
          - name: TARGET_BASE_DNS
            valueFrom:
              configMapKeyRef:
                name: "{{inputs.parameters.target}}"
                key: dns
        volumeMounts:
        - name: bucket-credentials
          mountPath: "/root/.aws/"
        workingDir: /src/
        command: [sh, -c]
        args:
          - |
            # Install AWS CLI
            apk add --no-cache aws-cli

            env
            ls -al
            ls -al ~/.aws/

            S3_BUCKET_NAME=$(cat ~/.aws/S3_BUCKET_NAME)

            echo "Building Astro site..."
            npm ci
            npm run build

            echo "Deploying to S3..."
            echo "S3_BUCKET_NAME: ${S3_BUCKET_NAME}"
            echo "VERSION: ${VERSION}"

            # OCI doesnt support the latest AWS integrity check
            export AWS_REQUEST_CHECKSUM_CALCULATION=when_required
            export AWS_RESPONSE_CHECKSUM_VALIDATION=when_required

            # Deploy versioned build
            aws s3 sync dist/ s3://${S3_BUCKET_NAME}/lib/harmony-design-system@${VERSION}/

            # Deploy to /harmony/ for latest version (like /dela/)
            aws s3 sync dist/ s3://${S3_BUCKET_NAME}/harmony/

            echo "Deployment complete!"
            echo "Versioned: https://${TARGET_BASE_DNS}/lib/harmony-design-system@${VERSION}/"
            echo "Latest: https://${TARGET_BASE_DNS}/harmony/"
